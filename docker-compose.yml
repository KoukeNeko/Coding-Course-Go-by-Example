version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      # Mount the docker socket to allow the backend to spawn sibling containers
      - /var/run/docker.sock:/var/run/docker.sock
      # We also need to share a temporary directory between host/backend and sibling containers
      # Because when backend runs `docker run -v /tmp/go-exec-123:/app`, 
      # the Docker daemon resolves `/tmp/go-exec-123` on the *host*.
      # Therefore, the backend must write to a directory that maps exactly to the host.
      - /tmp:/tmp
    environment:
      - PORT=8080

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
